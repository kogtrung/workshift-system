name: CI

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: TypeScript build + Jest tests ──────────────────────────────────
  backend:
    name: Backend — build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workshift-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workshift-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache mongodb-memory-server binary để tránh download lại mỗi lần
      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('workshift-backend/package-lock.json') }}
          restore-keys: mongodb-binaries-${{ runner.os }}-

      - name: TypeScript build
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-chars-ok
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars

  # ─── Frontend: ESLint + Vite build ───────────────────────────────────────────
  frontend:
    name: Frontend — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workshift-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workshift-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Placeholder build-time URL; thay bằng secret thật khi deploy
          VITE_API_BASE_URL: http://localhost:8080/api/v1
