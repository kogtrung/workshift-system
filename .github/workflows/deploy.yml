name: Deploy — Backend (Render · Docker)

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: Jest tests ──────────────────────────────────────────────────────
  backend-quality:
    name: Backend — test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workshift-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workshift-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('workshift-backend/package-lock.json') }}
          restore-keys: mongodb-binaries-${{ runner.os }}-

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-minimum-32-chars-ok
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars

  # ─── Frontend: ESLint ─────────────────────────────────────────────────────────
  frontend-quality:
    name: Frontend — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workshift-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: workshift-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  # ─── Backend: Docker build → Docker Hub → Render deploy hook ─────────────────
  deploy-backend:
    name: Deploy backend → Render (Docker)
    needs: [backend-quality, frontend-quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./workshift-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/shiftalyst-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # Render không tự poll Docker Hub — cần gọi deploy hook để trigger redeploy
      # Lấy URL tại: Render Dashboard → Service → Settings → Deploy Hook
      - name: Trigger Render redeploy
        env:
          HOOK_URL: ${{ secrets.RENDER_BACKEND_HOOK_URL }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -fsSL -X POST "$HOOK_URL" -d '{}'
            echo "Render deploy triggered."
          else
            echo "RENDER_BACKEND_HOOK_URL not set; skipping."
          fi

