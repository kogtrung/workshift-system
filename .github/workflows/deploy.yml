name: Deploy to Render (Docker)

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      IMAGE_TAG: latest
      IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/workshift-backend
      IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/workshift-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Login to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (backend) - sanity check
        working-directory: workshift-backend
        run: |
          npm ci
          npm run build

      - name: Build (frontend) - sanity check
        working-directory: workshift-frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Build & push backend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./workshift-backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v7.0.0
        with:
          context: ./workshift-frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}

      - name: Trigger Render backend rebuild (optional)
        run: |
          if [ -n '${{ secrets.RENDER_BACKEND_HOOK_URL }}' ]; then
            curl -fsSL -X POST \
              -H "Content-Type: application/json" \
              '${{ secrets.RENDER_BACKEND_HOOK_URL }}' \
              -d '{}' || true
          else
            echo "RENDER_BACKEND_HOOK_URL is not set; skipping"
          fi

      - name: Trigger Render frontend rebuild (optional)
        run: |
          if [ -n '${{ secrets.RENDER_FRONTEND_HOOK_URL }}' ]; then
            curl -fsSL -X POST \
              -H "Content-Type: application/json" \
              '${{ secrets.RENDER_FRONTEND_HOOK_URL }}' \
              -d '{}' || true
          else
            echo "RENDER_FRONTEND_HOOK_URL is not set; skipping"
          fi
