server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: phục vụ file tĩnh, nếu không tồn tại thì trả về index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Giữ cache cho asset (file có extension)
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}

